<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Tracker</title>
        <style>

            body {
                margin: 0;
                padding: 0 60px;
            }

            nav {
                display: flex;
                unicode-bidi: isolate;
                justify-content: center;
                border-bottom: 1px solid #bbbbbb;
                padding: 20px 0;
            }

            nav a {
                margin: 0 15px;
                text-decoration: none;
                font-weight:400;
                color:#000000;
                transition: all ease 0.2s;
                padding-top:20px;
                font-size: 25px;
                font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
            }

            nav a:hover {
                color:#b4b4b4
            }

            h1 {
                font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
                font-size: 50px;
                padding: 50px
            }

            h2 {
                font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
                font-size: 40px;
                padding: 50px
            }

        </style>
</head>
<body>
    <nav>
        <a href = "/">Home</a>
        <a href="/create-assignment">Create an Asignment</a>
        <a href="/update-status">Update Status</a>
        <a href="/view-assignments">View Assignments</a>
    </nav>
    <div style="width: 100%; max-width: 360px;">
        <h1>Assignment Tracker</h1>

        <p>Create an Assignment:</p>
        <input type="text" class="input-field" id="assignment" placeholder="assignment">

        <label for="assign-to">Assign To:</label>
        <select class="input-field" id="assign-to" name="assign_to">
            <option value="" disabled selected>Select a person</option>
            <option value="George">George</option>
            <option value="Ananya">Ananya</option>
            <option value="Varun">Varun</option>
            <option value="Rachel">Rachel</option>
        </select>

        <label for="priority">Priority:</label>
        <select class="input-field" id="priority" name="priority">
            <option value="" disabled selected>Priority</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>

        <button id="create">Create</button>

        <p id="result"></p>
    </div>

    <script>

        const btn = document.querySelector("#create");
        const URL = "http://localhost:8000";
        const result = document.querySelector("#result");

        btn.addEventListener("click", async () => {

            const assignment = document.querySelector("#assignment").value;
            const assign_to = document.querySelector("#assign-to").value;
            const priority = document.querySelector("#priority").value;

            try {
                const res = await fetch(`${URL}/new-assignment`, {
                    method: "POST", 
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        assignment: assignment,
                        assign_to: assign_to,
                        priority: priority,
                    })
                });

                const response = await res.json();
                if (response.status) {
                    result.innerText = response.status
                } else {
                    result.innerText = "no status message received, validate update on google sheet manually"
                }
                
            } catch (error) {
                result.innerText = "Error: " + error.message;
            }
        });

    </script>
</body>
</html>
