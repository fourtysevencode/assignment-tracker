<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Assignments — Assignment Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* Mark-as-done button inside card */
    .btn-done {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-done:hover:not(:disabled) {
      background: var(--color-success-bg);
      color: var(--color-success);
      border-color: #bbf7d0;
    }
    .btn-done:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-done.is-done {
      background: var(--color-success-bg);
      color: var(--color-success);
      border-color: #bbf7d0;
    }

    /* Card layout: stack on very narrow screens */
    .assignment-item {
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .a-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .a-id {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      font-weight: 600;
      background: var(--color-bg);
      border: 1px solid var(--color-border-light);
      border-radius: 4px;
      padding: 2px 7px;
    }
    @media (max-width: 480px) {
      .a-right { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="/">📋 Assignment Tracker</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/create-assignment">Create</a>
        <a href="/update-status">Update Status</a>
        <a href="/view-assignments" class="active">View Assignments</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>View Assignments</h1>
      <p>Select your name to see your assignments, their priority, status, and mark them done.</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="name">Your Name</label>
        <select id="name">
          <option value="" disabled selected>Select your name</option>
          <option value="George">George</option>
          <option value="Ananya">Ananya</option>
          <option value="Varun">Varun</option>
          <option value="Rachel">Rachel</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full" id="fetch">Fetch Assignments</button>
      <div class="status-msg" id="errorMsg"></div>
    </div>

    <div id="resultsArea" style="display:none;">
      <div class="section-label" id="resultsLabel"></div>
      <div class="assignment-list" id="assignmentList"></div>
    </div>
  </main>

  <script>
    // Nav toggle
    const toggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    toggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

    const btn         = document.getElementById('fetch');
    const errorMsg    = document.getElementById('errorMsg');
    const resultsArea = document.getElementById('resultsArea');
    const list        = document.getElementById('assignmentList');
    const label       = document.getElementById('resultsLabel');
    const BASE        = window.location.origin;

    function showError(text) {
      errorMsg.textContent = text;
      errorMsg.className = 'status-msg visible error';
    }

    function priorityBadge(p) {
      const map = {
        High:   'priority-high',
        Medium: 'priority-medium',
        Low:    'priority-low',
      };
      const cls = map[p];
      if (!cls) return '<span style="color:var(--color-text-muted)">—</span>';
      return `<span class="priority-badge ${cls}">${p}</span>`;
    }

    function statusBadge(completed) {
      const done = completed === 'Yes' || completed === true;
      return done
        ? `<span class="a-status done">Done</span>`
        : `<span class="a-status pending">Pending</span>`;
    }

    async function markDone(id, btn, statusEl) {
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const res = await fetch(`${BASE}/update-assignment-status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: parseInt(id), update: 'Yes' })
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        // Update UI
        statusEl.outerHTML = `<span class="a-status done">Done</span>`;
        btn.textContent = '✓ Done';
        btn.classList.add('is-done');
        btn.disabled = true;
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Mark as Done';
        alert('Failed to update: ' + err.message);
      }
    }

    btn.addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      if (!name) { showError('Please select your name.'); return; }

      errorMsg.className = 'status-msg';
      resultsArea.style.display = 'none';
      list.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Fetching…';

      try {
        const res = await fetch(`${BASE}/view-assignments-full`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);

        const data = await res.json();
        const assignments = data.assignments;

        if (!assignments || assignments.length === 0) {
          label.textContent = `No assignments found for ${name}`;
          resultsArea.style.display = 'block';
          return;
        }

        label.textContent = `${assignments.length} assignment${assignments.length !== 1 ? 's' : ''} for ${name}`;

        assignments.forEach(a => {
          const isDone = a.completed === 'Yes' || a.completed === true;
          const item = document.createElement('div');
          item.className = 'assignment-item';
          item.innerHTML = `
            <div class="a-meta">
              <div class="a-title">${a.assignment || '(unnamed)'}</div>
              <div class="a-details" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px;">
                ${priorityBadge(a.priority)}
                ${statusBadge(a.completed)}
              </div>
            </div>
            <div class="a-right">
              <span class="a-id">ID: ${a.id || '—'}</span>
              <button class="btn-done ${isDone ? 'is-done' : ''}" ${isDone ? 'disabled' : ''} data-id="${a.id}">
                ${isDone ? '✓ Done' : 'Mark as Done'}
              </button>
            </div>
          `;

          if (!isDone) {
            const doneBtn = item.querySelector('.btn-done');
            doneBtn.addEventListener('click', () => {
              const statusEl = item.querySelector('.a-status');
              markDone(a.id, doneBtn, statusEl);
            });
          }

          list.appendChild(item);
        });

        resultsArea.style.display = 'block';

      } catch (err) {
        showError(err.message || 'Something went wrong.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Fetch Assignments';
      }
    });
  </script>

</body>
</html>
