<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>View Assignments</title>
            <style>

            body {
                margin: 0;
                padding: 0 60px;
            }

            nav {
                display: flex;
                unicode-bidi: isolate;
                justify-content: center;
                border-bottom: 1px solid #bbbbbb;
                padding: 20px 0;
            }

            nav a {
                margin: 0 15px;
                text-decoration: none;
                font-weight:400;
                color:#000000;
                transition: all ease 0.2s;
                padding-top:20px;
                font-size: 25px;
                font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
            }

            nav a:hover {
                color:#b4b4b4
            }

            h1 {
                font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
                font-size: 50px;
                padding: 50px
            }

            h2 {
                font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
                font-size: 40px;
                padding: 50px
            }

        </style>
	</head>
    
    <body>
        <nav>
            <a href = "/">Home</a>
            <a href="/create-assignment">Create an Asignment</a>
            <a href="/update-status">Update Status</a>
            <a href="/view-assignments">View Assignments</a>
        </nav>
        <h2>View Assignments</h2>
        <label for="name">You are</label>
        <input id="name" type="text" placeholder="name">
        <button id="fetch">Fetch Data</button>
        <p id="result"></p>

        <script>
            const btn = document.querySelector("#fetch")
            const resultText = document.querySelector("#result")
            const URL = "http://localhost:8000"
            
            btn.addEventListener("click", async () => {
                try {
                    const name = document.querySelector("#name").value.trim()

                    if (!name) {
                        resultText.innerText = "Please enter a name."
                        return
                    }

                    const res = await fetch(`${URL}/view_assignments`, {
                        method:"POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({
                            "name": name
                        })
                    })

                    if (!res.ok) {
                        throw new Error(`Request failed with status ${res.status}`)
                    }

                    const data = await res.json()
                    const assignments = data.assignments
                    resultText.innerText = assignments
                } catch (error) {
                    resultText.innerText = error.message || "Something went wrong."
                }
            })
        </script>
    </body>
</html>
