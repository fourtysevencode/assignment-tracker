<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Assignments — Assignment Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="/">📋 Assignment Tracker</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/create-assignment">Create</a>
        <a href="/update-status">Update Status</a>
        <a href="/view-assignments" class="active">View Assignments</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>View Assignments</h1>
      <p>Enter your name to see all assignments assigned to you.</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="name">Your Name</label>
        <select id="name">
          <option value="" disabled selected>Select your name</option>
          <option value="George">George</option>
          <option value="Ananya">Ananya</option>
          <option value="Varun">Varun</option>
          <option value="Rachel">Rachel</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full" id="fetch">Fetch Assignments</button>

      <div class="status-msg" id="errorMsg"></div>
    </div>

    <div id="resultsArea" style="display:none;">
      <div class="section-label" id="resultsLabel"></div>
      <div class="assignment-list" id="assignmentList"></div>
    </div>
  </main>

  <script>
    const toggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    toggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

    const btn         = document.getElementById('fetch');
    const errorMsg    = document.getElementById('errorMsg');
    const resultsArea = document.getElementById('resultsArea');
    const list        = document.getElementById('assignmentList');
    const label       = document.getElementById('resultsLabel');
    const URL         = window.location.origin;

    function showError(text) {
      errorMsg.textContent = text;
      errorMsg.className = 'status-msg visible error';
    }

    function priorityClass(p) {
      const map = { High: 'priority-high', Medium: 'priority-medium', Low: 'priority-low' };
      return map[p] || '';
    }

    async function fetchPriority(title) {
      try {
        const res = await fetch(`${URL}/get-priority`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assignment: title })
        });
        if (!res.ok) return null;
        const data = await res.json();
        return data.priority || null;
      } catch {
        return null;
      }
    }

    function priorityBadge(p) {
      const map = {
        High:   { cls: 'priority-high',   label: 'High' },
        Medium: { cls: 'priority-medium', label: 'Medium' },
        Low:    { cls: 'priority-low',    label: 'Low' },
      };
      const entry = map[p];
      if (!entry) return '';
      return `<span class="priority-badge ${entry.cls}">${entry.label}</span>`;
    }

    btn.addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();

      if (!name) {
        showError('Please select your name.');
        return;
      }

      errorMsg.className = 'status-msg';
      resultsArea.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Fetching…';

      try {
        const res = await fetch(`${URL}/view_assignments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });

        if (!res.ok) throw new Error(`Server error ${res.status}`);

        const data = await res.json();
        const assignments = data.assignments;

        list.innerHTML = '';

        const isEmpty = !assignments ||
          (Array.isArray(assignments) && assignments.length === 0) ||
          (typeof assignments === 'string' && assignments.trim() === '');

        if (isEmpty) {
          label.textContent = `No assignments found for ${name}`;
          resultsArea.style.display = 'block';
          return;
        }

        const items = Array.isArray(assignments)
          ? assignments
          : assignments.split('\n').map(s => s.trim()).filter(Boolean);

        label.textContent = `${items.length} assignment${items.length !== 1 ? 's' : ''} for ${name}`;

        // Render cards immediately with a loading placeholder for priority
        const cardEls = items.map((title, idx) => {
          const item = document.createElement('div');
          item.className = 'assignment-item';
          item.innerHTML = `
            <div class="a-meta">
              <div class="a-title">${title || '(unnamed)'}</div>
              <div class="a-details">
                Priority: <span class="prio-placeholder" style="color:var(--color-text-muted);font-size:0.8rem;">loading…</span>
              </div>
            </div>
          `;
          list.appendChild(item);
          return { item, title };
        });

        resultsArea.style.display = 'block';

        // Fetch all priorities in parallel, then update each card
        const priorities = await Promise.all(cardEls.map(({ title }) => fetchPriority(title)));

        cardEls.forEach(({ item }, idx) => {
          const p = priorities[idx];
          const placeholder = item.querySelector('.prio-placeholder');
          if (placeholder) {
            placeholder.outerHTML = p ? priorityBadge(p) : '<span style="color:var(--color-text-muted)">—</span>';
          }
        });

      } catch (err) {
        showError(err.message || 'Something went wrong.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Fetch Assignments';
      }
    });
  </script>

</body>
</html>
